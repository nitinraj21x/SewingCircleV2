# Render Blueprint for Sewing Circle Frontend
# This file can be used for automated deployment

services:
  - type: web
    name: sewing-circle-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 18
